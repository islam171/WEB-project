<div class="slider-section">
  <div class="section-header">
    <h2>Popular Actors</h2>
    <a routerLink="/actors" class="view-all-btn">View All <img src="assets/Icons/right-arrow.png"></a>
  </div>

  <div class="slider-container">
    <button class="nav-btn prev-btn" (click)="prev()" [disabled]="currentIndex === 0">
      <img src="assets/Icons/left-arrow.png" alt="Prev">
    </button>

    <div class="actors-track">
      @for (actor of visibleActors; track actor.id) {
        <div class="actor-card">
          <img [src]="actor.photo || 'assets/Icons/actor.png'" [alt]="actor.name" class="actor-photo">
          <p class="actor-name">{{ actor.name }}</p>
        </div>
      }
    </div>

    <button class="nav-btn next-btn" (click)="next()" [disabled]="currentIndex + itemsToShow >= actors.length">
      <img src="assets/Icons/left-arrow.png" alt="Next">
    </button>
  </div>
</div>
