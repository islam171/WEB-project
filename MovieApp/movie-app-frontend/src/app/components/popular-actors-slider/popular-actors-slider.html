<div class="slider-section">
  <div class="section-header">
    <h2>Popular Actors</h2>
    <a routerLink="/actors" class="view-all-btn">
      View All <img src="assets/Icons/right-arrow.png" alt=">">
    </a>
  </div>

  <div class="slider-container">
    <button class="nav-btn prev-btn" (click)="prev()" [disabled]="currentIndex === 0">
      <img src="assets/Icons/left-arrow.png" alt="Prev">
    </button>

    <div class="actors-track">
      @for (actor of visibleActors; track actor.id) {
        <div class="actor-card">
          <a [routerLink]="['/actors', actor.id]" class="actor-link">
            <img [src]="actor.photo || 'assets/Icons/actor.png'" [alt]="actor.name" class="actor-photo">
            <p class="actor-name">{{ actor.name }}</p>
          </a>

<!--          <div class="bookmark-ribbon" (click)="toggleActorLike(actor, $event)">-->
<!--            @if (actor.isLiked) {-->
<!--              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="icon-svg" fill="currentColor">-->
<!--                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>-->
<!--              </svg>-->
<!--            } @else {-->
<!--              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="icon-svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">-->
<!--                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>-->
<!--              </svg>-->
<!--            }-->
<!--          </div>-->
        </div>
      }
    </div>

    <button class="nav-btn next-btn" (click)="next()" [disabled]="currentIndex + itemsToShow >= actors.length">
      <img src="assets/Icons/left-arrow.png" alt="Next">
    </button>
  </div>
</div>
