@if (errorMessage) {
  <div class="banner-error">{{ errorMessage }}</div>
}

@if (movie) {
  <div class="movie-banner" [style.backgroundImage]="'url(' + movie.backdrop + ')'" [class.fading]="isFading">
    <div class="overlay">
      <div class="banner-inner">

        <a [routerLink]="['/movies', movie.id]" class="poster-container">
          <img [src]="movie.poster" class="main-poster">
        </a>

        <div class="movie-details">
          <div class="title-wrapper">
            <a [routerLink]="['/movies', movie.id]" class="movie-link-wrapper">
              <h1 class="movie-title">{{ movie.title }} ({{ movie.year }})</h1>
            </a>

            <button
              type="button"
              class="wishlist-btn wishlist-btn--banner"
              (click)="toggleWatchlist()">
              @if (!(movie.inWatchlist || movie.in_wishlist)) {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="wishlist-icon" fill="none"
                     stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="wishlist-icon active" fill="currentColor">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                </svg>
              }
            </button>
          </div>

          <div class="stats">
            <span class="stat-item">{{ movie.duration }}</span>
            <span class="stat-item">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="stat-icon heart-icon"
                   fill="currentColor">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
              </svg>
              {{ movie.likes }}
            </span>
            <span class="stat-item">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="stat-icon star-icon"
                   fill="currentColor">
                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path>
              </svg>
              {{ movie.rating }}
            </span>
          </div>

          <a [routerLink]="['/movies', movie.id]" class="movie-link-wrapper">
            <p class="tagline">{{ movie.short_description }}</p>
          </a>

        </div>
      </div>
    </div>
  </div>
}
