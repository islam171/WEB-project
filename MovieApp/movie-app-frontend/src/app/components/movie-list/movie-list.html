<div class="movie__list">
    @if (movies) {
        @for (movie of movies; track movie.id) {
            <div class="movie__item">
                <img [src]="movie?.poster" alt="">

              <button class="wishlist-btn" (click)="toggleWishlist($event, movie.id)">
                @if ((wishlistIds$ | async)?.has(movie.id)) {
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="wishlist-icon active" fill="currentColor">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                  </svg>
                } @else {
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="wishlist-icon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                  </svg>
                }
              </button>
                <div class="movie__info">
                    <div class="movie__title">
                        <a [routerLink]="['/movies', movie.id]">{{ movie?.title }}</a>
                    </div>
                    <div class="tab"></div>
                    <div class="movie__bottom">
                        <div class="duration">{{ movie?.duration }}</div>
                        <div class="likes stat-pill">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="stat-icon heart-icon" fill="currentColor">
                                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"></path>
                            </svg>
                            {{ movie?.likes }}
                        </div>
                        <div class="rating stat-pill">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="stat-icon star-icon" fill="currentColor">
                                <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"></path>
                            </svg>
                            {{ movie?.rating }}
                        </div>
                    </div>
                </div>
            </div>
        }
    }


</div>
