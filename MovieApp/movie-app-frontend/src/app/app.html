@if (isAppLoading) {
  <div class="app-loader" [class.app-loader--hidden]="!isLoaderVisible">
    <div class="app-loader__glow"></div>
    <img src="assets/Icons/Cosmos.gif" alt="Loading" class="app-loader__gif">
  </div>
}

<div class="container" [class.container--loading]="isAppLoading">

    <app-header></app-header>

    <main class="main-layout">
        <router-outlet></router-outlet>
    </main>

    <app-footer></app-footer>
</div>
