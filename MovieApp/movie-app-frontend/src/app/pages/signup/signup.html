<div class="signed-up-card">
  <h2>Sign Up</h2>
  <p>Create new account</p>

  <form (ngSubmit)="onSubmit()" #signupForm="ngForm">
    <div class="input-group">
      <img src="../../../assets/Icons/person_login.png" alt="">
      <input
        type="text"
        placeholder="Username"
        name="username"
        [(ngModel)]="credentials.username"
        required
      >
    </div>

    <div class="input-group">
      <img src="../../../assets/Icons/email-login.png" alt="">
      <input
        type="email"
        placeholder="Email"
        name="email"
        [(ngModel)]="credentials.email"
      >
    </div>

    <div class="input-group">
      <img src="../../../assets/Icons/lock-login.png" alt="">
      <input
        type="password"
        placeholder="Password"
        name="password"
        [(ngModel)]="credentials.password"
        required
      >
    </div>

    @if (errorMessage) {
      <p class="error-message">{{ errorMessage }}</p>
    }

    <p class="account">
      Already have an account?
      <a routerLink="/sign-in">Login</a>
    </p>

    <button type="submit" class="submit-btn" [disabled]="!signupForm.form.valid">
      Signup
    </button>
  </form>
</div>
