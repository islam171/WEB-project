<div class="catalog">
    <div class="top">
        <app-search-input (searchChanged)="onSearch($event)"/>
        <app-sort/>
    </div>
    <div class="title">Genres</div>
    <app-genre-list/>
    <section class="movies">
        @if (movies && !loading) {
            <app-movie-list [movies]="movies"/>
        }
    </section>
</div>
